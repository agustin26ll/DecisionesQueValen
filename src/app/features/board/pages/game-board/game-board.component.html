<div class="game-layout">
    <app-card-panel (draw)="drawCard()"></app-card-panel>
    
    <app-hud [currentPlayer]="getCurrentPlayer()"></app-hud>
    <div class="board-wrapper">

        <div class="board-area">
            <img src="assets/BaseTableCut.png" class="board">

            <div class="player-token" *ngFor="let player of game.players" [style.left.%]="getPosition(player).x"
                [style.top.%]="getPosition(player).y" [style.background]="player.color">
                {{player.id+1}}
            </div>

            <app-dice></app-dice>
        </div>

        <div class="card-overlay" *ngIf="showCard" (click)="closeCard()">

            <img [@cardReveal] [src]="currentCard?.image" class="revealed-card">

        </div>

    </div>

    <app-players-panel></app-players-panel>

</div>
